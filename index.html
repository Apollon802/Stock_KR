<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Livermore Trend Analyzer</title><style>body{margin:0;padding:12px;background:#f7f9fc;color:#182230;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',Arial,sans-serif}.app{max-width:920px;margin:auto}.card,.hero{background:white;border:1px solid #e4eaf3;border-radius:24px;box-shadow:0 10px 30px rgba(16,24,40,.07);padding:16px;margin-top:12px}h1{font-size:2rem;margin:0}.warn{margin-top:14px;padding:12px;border-radius:16px;background:#fff8eb;border:1px solid #f6d79b;color:#7a4b00}.search{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:16px}input,button,select{font:inherit;border-radius:16px;border:1px solid #e4eaf3;padding:14px;background:white}button{background:#2f6fed;color:white;font-weight:800;border:0}.secondary{background:white;color:#182230;border:1px solid #e4eaf3}.auto{position:relative}.list{position:absolute;z-index:10;width:100%;max-height:340px;overflow:auto;background:white;border:1px solid #e4eaf3;border-radius:16px;box-shadow:0 10px 30px rgba(16,24,40,.07)}.item{display:grid;grid-template-columns:1fr auto;padding:12px;border-bottom:1px solid #eef2f7;cursor:pointer}.small{color:#667085;font-size:.85rem}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{padding:8px 10px;border-radius:999px;background:#eef3ff;color:#2b4db5;font-weight:800}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{border:1px solid #e4eaf3;border-radius:18px;padding:12px}.label{font-size:.8rem;color:#667085}.value{font-size:1.1rem;font-weight:900}.up{color:#16a34a}.down{color:#dc2626}.flat{color:#667085}.layout{display:grid;grid-template-columns:1.4fr 1fr;gap:12px}canvas{width:100%;height:390px;border:1px solid #e4eaf3;border-radius:18px}.check{border:1px solid #e4eaf3;border-radius:18px;padding:12px;margin:10px 0}@media(max-width:760px){.search,.layout{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}}select{width:220px;max-width:100%}</style></head><body><div class="app"><section class="hero"><h1>Livermore Trend Analyzer</h1><div class="warn">교육용·분석용 도구입니다. 직접적인 매수·매도 추천이 아니며, 과거 흐름은 미래 성과를 보장하지 않습니다.</div><div class="search"><input id="q" placeholder="예) 주식/ETF 종목명 또는 티커 입력" autocomplete="off"><button id="go">분석</button></div><div class="auto" id="auto"></div></section><h2>핵심 상태</h2><section class="card"><div class="chips" id="chips"></div><div id="signal" style="font-size:1.6rem;font-weight:950;margin-top:10px">분석 대기</div><div id="reason" class="small" style="font-size:1rem;margin-top:8px">종목 또는 ETF를 입력하고 분석을 누르세요.</div></section><section class="card"><div class="grid" id="summary"></div></section><section class="card layout"><div><h2>가격 + 이동평균 차트</h2><select id="range"><option value="1">1일</option><option value="3">3일</option><option value="5">5일</option><option value="10">2주</option><option value="21">1개월</option><option value="42">2개월</option><option value="63">3개월</option><option value="126">6개월</option><option value="252" selected>1년</option><option value="504">2년</option></select><canvas id="chart"></canvas><div class="small">종가 / SMA20 / SMA60 / SMA120 / 피보탈</div></div><div><h2>리버모어 체크리스트</h2><div id="checks" class="small">분석 후 표시됩니다.</div></div></section><h2>관찰 후보 목록</h2><section class="card"><button class="secondary" id="add">현재 종목 추가</button> <button class="secondary" id="refresh">목록 새로고침</button> <button class="secondary" id="clear">전체 삭제</button><div id="watch"></div></section></div><script>
const API='https://stocketf.ost08021.workers.dev';let master=[],cur=null,days=252,watch=[];const base=[['SK','034730.KS','KOSPI','STOCK',['SK주식회사','에스케이','SK Holdings']],['삼성전자','005930.KS','KOSPI','STOCK',['삼전']],['SK하이닉스','000660.KS','KOSPI','STOCK',['하이닉스']],['LG','003550.KS','KOSPI','STOCK',['엘지']],['CJ','001040.KS','KOSPI','STOCK',['씨제이']],['GS','078930.KS','KOSPI','STOCK',['지에스']],['LS','006260.KS','KOSPI','STOCK',['엘에스']],['두산에너빌리티','034020.KS','KOSPI','STOCK',['두산중공업']],['리가켐바이오','141080.KQ','KOSDAQ','STOCK',['레고켐바이오']],['실리콘투','257720.KQ','KOSDAQ','STOCK',[]],['TIGER 미국S&P500','360750.KS','KOSPI','ETF',['TIGER S&P500']],['QQQ','QQQ','US','ETF',[]],['SPY','SPY','US','ETF',[]],['SCHD','SCHD','US','ETF',[]]].map(x=>({name:x[0],symbol:x[1],market:x[2],type:x[3],keywords:x[4]}));
const $=id=>document.getElementById(id),norm=s=>String(s||'').trim().toLowerCase().replace(/\s+/g,'');async function loadM(){try{let r=await fetch('./kr_stock_master.json?v='+Date.now(),{cache:'no-store'});let d=await r.json();master=Array.isArray(d)?d:base}catch{master=base}}function find(q){let s=String(q||'').trim(),n=norm(s);return master.find(x=>norm(x.name)===n||String(x.symbol).toUpperCase()===s.toUpperCase()||String(x.symbol).replace(/\.(KS|KQ)$/,'')===s||(x.keywords||[]).some(k=>norm(k)===n))}function search(q){let s=String(q||'').trim(),n=norm(s);return master.filter(x=>norm(x.name).includes(n)||String(x.symbol).toUpperCase().includes(s.toUpperCase())||(x.keywords||[]).some(k=>norm(k).includes(n))).slice(0,20)}async function api(p,o={}){let r=await fetch(API+p,o);if(!r.ok)throw Error(await r.text());return r.json()}function auto(items){$('auto').innerHTML=items.length?'<div class="list">'+items.map(i=>`<div class="item" data-s="${i.symbol}"><div><b>${i.name}</b><div class="small">${i.market} ${i.type}</div></div><b>${i.symbol}</b></div>`).join('')+'</div>':'';document.querySelectorAll('.item').forEach(e=>e.onclick=()=>{$('q').value=e.dataset.s;$('auto').innerHTML='';analyze(e.dataset.s)})}function symbol(raw){let f=find(raw);if(f)return f.symbol;let u=String(raw).toUpperCase();if(/^\d{6}$/.test(u)){let by=master.find(x=>String(x.symbol).startsWith(u+'.'));return by?by.symbol:u+'.KS'}return u}function pct(v){if(v==null||isNaN(v))return'-';return `<span class="${v>0?'up':v<0?'down':'flat'}">${v>0?'+':''}${Number(v).toFixed(2)}%</span>`}function price(v,c){if(v==null||isNaN(v))return'-';return `${c==='KRW'?'₩':c||''} ${Number(v).toLocaleString('ko-KR',{maximumFractionDigits:v>=1000?0:2})}`.trim()}function render(d){cur=d;let a=d.analysis,r=d.returns,m=d.metrics;let sig=a.abnormalBehavior?'위험관리 우선':a.score>=75?'강한 추세 관심':a.score>=55?'추세 유지 관찰':'보수적 관망';$('chips').innerHTML=[a.grade,a.trendLabel,a.pivotalLabel,d.meta.symbol].map(x=>`<span class="chip">${x}</span>`).join('');$('signal').innerHTML=`<span class="${sig.includes('강한')?'up':sig.includes('위험')||sig.includes('보수')?'down':'flat'}">${sig}</span>`;$('reason').textContent=a.abnormalBehavior?'이상 행동 경고가 있어 신규 접근보다 위험관리 확인이 우선입니다.':'피보탈, 거래량, 이동평균, MACD 조건을 함께 확인하세요.';let rows=[['현재가',price(d.meta.currentPrice,d.meta.currency)],['전일 대비',pct(d.meta.dayChangePct)],['1주',pct(r['1w'])],['2주',pct(r['2w'])],['1개월',pct(r['1m'])],['2개월',pct(r['2m'])],['3개월',pct(r['3m'])],['6개월',pct(r['6m'])],['1년',pct(r['1y'])],['추세 점수',a.score.toFixed(0)+' / 100'],['거래량 비율',a.volumeRatio.toFixed(2)+'x'],['피보탈',price(a.pivotalPoint,d.meta.currency)]];$('summary').innerHTML=rows.map(x=>`<div class="stat"><div class="label">${x[0]}</div><div class="value">${x[1]}</div></div>`).join('');$('checks').innerHTML=[`시장 방향: ${a.maStacked?'정배열':'미완성'}`,`피보탈: ${a.pivotalLabel}`,`거래량: ${a.volumeRatio.toFixed(2)}x`, `MACD: ${m.macdPct.toFixed(2)} / ${m.signalPct.toFixed(2)}`,`이상 행동: ${a.abnormalBehavior?'주의':'특이 없음'}`].map(x=>`<div class="check">${x}</div>`).join('');draw(d)}function draw(d){let c=$('chart'),ctx=c.getContext('2d'),rect=c.getBoundingClientRect(),ratio=devicePixelRatio||1;c.width=rect.width*ratio;c.height=390*ratio;ctx.scale(ratio,ratio);ctx.clearRect(0,0,rect.width,390);let list=(d.series||[]).slice(-days);if(list.length<2)return;let p={l:55,r:55,t:20,b:45},w=rect.width-p.l-p.r,h=390-p.t-p.b,vals=[...list.map(x=>x.close),...list.map(x=>x.sma20),...list.map(x=>x.sma60),...list.map(x=>x.sma120),d.analysis.pivotalPoint].filter(Number.isFinite),min=Math.min(...vals),max=Math.max(...vals),pad=(max-min)*.08||1,ymin=min-pad,ymax=max+pad,x=i=>p.l+i/(list.length-1)*w,y=v=>p.t+(1-(v-ymin)/(ymax-ymin))*h;ctx.strokeStyle='#e7edf7';ctx.fillStyle='#667085';ctx.font='11px system-ui';for(let i=0;i<5;i++){let gy=p.t+h/4*i;ctx.beginPath();ctx.moveTo(p.l,gy);ctx.lineTo(p.l+w,gy);ctx.stroke();ctx.fillText(Number(ymax-(ymax-ymin)/4*i).toLocaleString('ko-KR',{maximumFractionDigits:0}),p.l+w+5,gy)}function line(arr,col,lw=2){ctx.beginPath();ctx.strokeStyle=col;ctx.lineWidth=lw;let s=0;arr.forEach((v,i)=>{if(!Number.isFinite(v))return;if(!s){ctx.moveTo(x(i),y(v));s=1}else ctx.lineTo(x(i),y(v))});ctx.stroke()}line(list.map(r=>r.close),'#2f6fed',2.6);line(list.map(r=>r.sma20),'#16a34a');line(list.map(r=>r.sma60),'#ea580c');line(list.map(r=>r.sma120),'#7c3aed');let py=y(d.analysis.pivotalPoint);ctx.strokeStyle='#ef4444';ctx.setLineDash([6,4]);ctx.beginPath();ctx.moveTo(p.l,py);ctx.lineTo(p.l+w,py);ctx.stroke();ctx.setLineDash([])}async function analyze(raw){try{let exact=find(raw),c=search(raw);if(!exact&&c.length>1&&String(raw).length<=3){auto(c);throw Error(`'${raw}' 검색 결과가 여러 개입니다. 아래 자동완성 목록에서 종목을 선택해 주세요.`)}let s=exact?exact.symbol:(c.length===1?c[0].symbol:symbol(raw));let d=await api('/analyze?symbol='+encodeURIComponent(s)+'&market=AUTO');$('auto').innerHTML='';$('q').value=(exact||c[0]||{}).name||d.meta.displayName||s;render(d)}catch(e){alert(e.message||'분석 실패')}}$('go').onclick=()=>analyze($('q').value);$('q').oninput=e=>auto(search(e.target.value));$('q').onkeydown=e=>{if(e.key==='Enter')analyze($('q').value)};$('range').onchange=e=>{days=Number(e.target.value);if(cur)draw(cur)};$('add').onclick=()=>{if(!cur)return alert('먼저 종목을 분석해 주세요.');let s=cur.meta.symbol;if(!watch.includes(s))watch.push(s);localStorage.setItem('watch_v8',JSON.stringify(watch));showWatch()};$('refresh').onclick=showWatch;$('clear').onclick=()=>{watch=[];localStorage.setItem('watch_v8','[]');showWatch()};async function showWatch(){watch=JSON.parse(localStorage.getItem('watch_v8')||'[]');$('watch').innerHTML=watch.length?watch.map(s=>`<div class="check"><b>${s}</b> <button class="secondary" onclick="analyze('${s}')">열기</button></div>`).join(''):'<div class="small">아직 워치리스트가 없습니다.</div>'}loadM().then(showWatch);
</script></body></html>
