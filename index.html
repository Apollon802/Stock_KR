<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Livermore Trend Analyzer Mobile - stocketf</title>
  <style>
    :root { --bg:#f7f9fc; --panel:#fff; --line:#e6ebf3; --text:#1b2430; --muted:#667085; --blue:#2f6fed; --green:#16a34a; --orange:#f59e0b; --red:#dc2626; --chip:#eef3ff; --shadow:0 8px 24px rgba(16,24,40,.06); }
    *{box-sizing:border-box} html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif} body{padding:14px}
    .app{max-width:860px;margin:0 auto} .hero,.card{background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)} .hero{padding:18px;margin-top:8px} .card{padding:14px;margin-top:12px}
    .sub,.muted,.hint{color:var(--muted)} .warning{margin-top:12px;padding:12px 14px;border-radius:14px;background:#fff8eb;color:#7a4b00;border:1px solid #f6d79b;font-size:.9rem;line-height:1.45}
    input,select,button{font:inherit;border-radius:14px;border:1px solid var(--line);background:#fff;color:var(--text);outline:none} input,select{padding:14px} button{padding:14px 16px;cursor:pointer;font-weight:700;background:var(--blue);color:#fff;border-color:transparent}
    button.secondary{background:#fff;color:var(--text);border-color:var(--line)} .search-box{display:grid;grid-template-columns:1fr 92px auto;gap:8px;margin-top:16px} @media(max-width:640px){.search-box{grid-template-columns:1fr 84px} .search-box button{grid-column:1/-1}}
    .autocomplete-box{position:relative;margin-top:8px} .autocomplete-list{position:absolute;top:0;width:100%;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);z-index:20;overflow:hidden} .autocomplete-item{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:12px 14px;border-bottom:1px solid #eef2f7;cursor:pointer} .autocomplete-item:hover{background:#f8fbff}
    .section-title{display:flex;justify-content:space-between;align-items:center;margin:18px 0 8px;gap:10px} .section-title h2{margin:0;font-size:1rem}
    .chips,.toolbar,.watch-meta{display:flex;gap:8px;flex-wrap:wrap} .chip,.mini-chip,.badge{border-radius:999px;font-weight:700} .chip{padding:8px 10px;background:var(--chip);color:#2b4db5;border:1px solid #dfe8ff;font-size:.84rem}
    .stats-grid{display:grid;gap:10px;grid-template-columns:repeat(4,minmax(0,1fr))} @media(max-width:768px){.stats-grid{grid-template-columns:repeat(2,minmax(0,1fr))}} .stat{border:1px solid var(--line);border-radius:16px;padding:12px;background:#fff} .label{font-size:.78rem;color:var(--muted);margin-bottom:8px} .value{font-size:1.05rem;font-weight:800} .up{color:var(--green)} .down{color:var(--red)} .flat{color:var(--muted)}
    .layout{display:grid;grid-template-columns:1.45fr .95fr;gap:12px} @media(max-width:920px){.layout{grid-template-columns:1fr}} canvas{width:100%;min-height:270px;border-radius:18px;background:linear-gradient(180deg,#fff 0%,#f8fbff 100%);border:1px solid var(--line)}
    .checklist{display:grid;gap:8px} .check{display:flex;justify-content:space-between;gap:12px;padding:11px 12px;border:1px solid var(--line);border-radius:14px;background:#fbfcff;font-size:.92rem} .badge{padding:4px 8px;font-size:.76rem;white-space:nowrap} .good{background:#ebfff1;color:#0b7a31} .warn{background:#fff7ea;color:#9a5c00} .bad{background:#fff1f1;color:#b42318} .info{background:#eef3ff;color:#2746aa}
    .watch-item{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:12px;border:1px solid var(--line);border-radius:16px;background:#fff;margin-top:10px} .mini-chip{background:#f5f8ff;border:1px solid #dde6ff;color:#3754b1;padding:5px 8px;font-size:.76rem}
  </style>
</head>
<body>
<div class="app">
  <section class="hero">
    <h1>Livermore Trend Analyzer Mobile</h1>
    <div class="sub">라이트모드 전용 · Jesse Livermore 스타일 분석기 · <strong>API_BASE가 이미 stocketf 주소로 반영됨</strong></div>
    <div class="warning">교육용·분석용 도구입니다. 매수·매도 추천이 아닙니다. 과거 흐름은 미래 성과를 보장하지 않습니다.</div>
    <div class="search-box">
      <input id="symbolInput" placeholder="예: AAPL, MSFT, SPY, 005930, 005930.KS, 247540.KQ" autocomplete="off" />
      <select id="marketSelect">
        <option value="AUTO">자동</option><option value="US">미국</option><option value="KOSPI">KOSPI</option><option value="KOSDAQ">KOSDAQ</option>
      </select>
      <button id="analyzeBtn">분석</button>
    </div>
    <div id="autocompleteBox" class="autocomplete-box"></div>
    <div class="hint" style="margin-top:10px">적용된 Worker 주소: <strong>https://stocketf.ost08021.workers.dev</strong></div>
  </section>

  <div class="section-title"><h2>핵심 상태</h2><div class="chips" id="statusChips"></div></div>
  <section class="card"><div class="stats-grid" id="summaryGrid"></div></section>

  <section class="layout card">
    <div>
      <div class="section-title" style="margin-top:0"><h2>가격 + 이동평균 차트</h2><div class="toolbar"><button class="secondary" data-range="6mo">6개월</button><button class="secondary" data-range="1y">1년</button><button class="secondary" data-range="2y">2년</button></div></div>
      <canvas id="priceChart" width="900" height="360"></canvas>
    </div>
    <div>
      <div class="section-title" style="margin-top:0"><h2>리버모어 체크리스트</h2></div>
      <div class="checklist" id="checklist"></div>
    </div>
  </section>

  <div class="section-title"><h2>관찰 후보 목록</h2><div class="toolbar"><button class="secondary" id="addWatchlistBtn">현재 종목 추가</button><button class="secondary" id="refreshWatchlistBtn">목록 새로고침</button><button class="secondary" id="clearWatchlistBtn">전체 삭제</button></div></div>
  <section class="card"><div id="watchlist"></div></section>
</div>

<script>
const API_BASE = 'https://stocketf.ost08021.workers.dev';
const state = { current:null, chartRange:'1y', watchlist:[] };
const els = {
 symbolInput:document.getElementById('symbolInput'), marketSelect:document.getElementById('marketSelect'), analyzeBtn:document.getElementById('analyzeBtn'), statusChips:document.getElementById('statusChips'), summaryGrid:document.getElementById('summaryGrid'), checklist:document.getElementById('checklist'), priceChart:document.getElementById('priceChart'), watchlist:document.getElementById('watchlist'), addWatchlistBtn:document.getElementById('addWatchlistBtn'), refreshWatchlistBtn:document.getElementById('refreshWatchlistBtn'), clearWatchlistBtn:document.getElementById('clearWatchlistBtn'), autocompleteBox:document.getElementById('autocompleteBox')
};
let autocompleteTimer=null, lastAutocompleteQuery='';

function normalizeSymbol(raw, market){ const s=String(raw||'').trim().toUpperCase(); if(!s) return ''; if(/^\d{6}$/.test(s)){ if(market==='KOSPI') return `${s}.KS`; if(market==='KOSDAQ') return `${s}.KQ`; } return s; }
function saveWatchlist(){ localStorage.setItem('livermore_watchlist_stocketf', JSON.stringify(state.watchlist)); }
function loadWatchlist(){ try{ state.watchlist=JSON.parse(localStorage.getItem('livermore_watchlist_stocketf')||'[]'); if(!Array.isArray(state.watchlist)) state.watchlist=[]; }catch{ state.watchlist=[]; } }
function clearAutocomplete(){ els.autocompleteBox.innerHTML=''; }
function fmtPrice(v,c){ if(v==null||Number.isNaN(v)) return '-'; const d=v>=1000?0:v>=100?1:2; return `${c||''} ${Number(v).toLocaleString('ko-KR',{maximumFractionDigits:d,minimumFractionDigits:d>1?2:0})}`.trim(); }
function fmtPct(v){ if(v==null||Number.isNaN(v)) return '-'; const n=Number(v), cls=n>0?'up':n<0?'down':'flat'; return `<span class="${cls}">${n>0?'+':''}${n.toFixed(2)}%</span>`; }
function badge(text, kind='info'){ return `<span class="badge ${kind}">${text}</span>`; }
async function fetchJSON(path, options={}){ const r=await fetch(`${API_BASE}${path}`, options); if(!r.ok){ const t = await r.text(); throw new Error(t || `HTTP ${r.status}`); } return await r.json(); }
function renderAutocomplete(items){ if(!items?.length){ clearAutocomplete(); return; } els.autocompleteBox.innerHTML=`<div class="autocomplete-list">${items.map(item=>`<div class="autocomplete-item" data-symbol="${item.symbol}" data-market="${item.market||''}"><div><div style="font-weight:700">${item.name||item.symbol}</div><div class="muted" style="font-size:.82rem">${item.exchange||''} ${item.type||''}</div></div><div style="font-weight:800;color:#3754b1">${item.symbol}</div></div>`).join('')}</div>`; els.autocompleteBox.querySelectorAll('.autocomplete-item').forEach(el=>el.addEventListener('click',()=>{ els.symbolInput.value=el.dataset.symbol||''; const m=el.dataset.market||''; if(m && ['US','KOSPI','KOSDAQ'].includes(m)) els.marketSelect.value=m; clearAutocomplete(); els.analyzeBtn.click(); })); }
async function fetchAutocomplete(query){ const q=String(query||'').trim(); if(q.length<2){ clearAutocomplete(); return; } try{ const data=await fetchJSON(`/search?q=${encodeURIComponent(q)}&market=${encodeURIComponent(els.marketSelect.value)}`); if(q!==lastAutocompleteQuery) return; renderAutocomplete(data.items||[]); }catch{ clearAutocomplete(); } }
function renderStatusChips(d){ els.statusChips.innerHTML=[d.analysis.grade,d.analysis.trendLabel,d.analysis.pivotalLabel,d.meta.symbol].map(v=>`<span class="chip">${v}</span>`).join(''); }
function renderSummary(d){ const r=d.returns; const stats=[['현재가',fmtPrice(d.meta.currentPrice,d.meta.currencySymbol)],['전일 대비',fmtPct(d.meta.dayChangePct)],['1주',fmtPct(r['1w'])],['2주',fmtPct(r['2w'])],['1개월',fmtPct(r['1m'])],['2개월',fmtPct(r['2m'])],['3개월',fmtPct(r['3m'])],['6개월',fmtPct(r['6m'])],['1년',fmtPct(r['1y'])],['추세 점수',`<span class="${d.analysis.score>=70?'up':d.analysis.score>=50?'flat':'down'}">${d.analysis.score.toFixed(0)} / 100</span>`],['거래량 비율',`${d.analysis.volumeRatio.toFixed(2)}x`],['피보탈',fmtPrice(d.analysis.pivotalPoint,d.meta.currencySymbol)]]; els.summaryGrid.innerHTML=stats.map(([l,v])=>`<div class="stat"><div class="label">${l}</div><div class="value">${v}</div></div>`).join(''); }
function renderChecklist(d){ const rows=[['시장 방향(20>60>120)', d.analysis.maStacked?badge('정배열','good'):badge('미완성','warn')],['현재가 vs SMA20', d.analysis.aboveSma20?badge('상단 유지','good'):badge('하단','bad')],['현재가 vs SMA60', d.analysis.aboveSma60?badge('상단 유지','good'):badge('하단','warn')],['피보탈 상태', badge(d.analysis.pivotalLabel, d.analysis.pivotalState==='breakout'?'good':d.analysis.pivotalState==='near'?'warn':'info')],['거래량 확인', d.analysis.volumeRatio>=1.3?badge('유입 확인','good'):d.analysis.volumeRatio>=0.9?badge('보통','info'):badge('약함','warn')],['정상 조정 여부', d.analysis.normalReaction?badge('정상 조정 가능','good'):badge('확인 필요','info')],['MACD 방향', d.analysis.macdBullish?badge('상방 우위','good'):badge('중립/약세','warn')],['이상 행동 경고', d.analysis.abnormalBehavior?badge('주의','bad'):badge('특이 없음','good')]]; els.checklist.innerHTML=rows.map(([n,b])=>`<div class="check"><span>${n}</span>${b}</div>`).join(''); }
function drawChart(d){ const canvas=els.priceChart, ctx=canvas.getContext('2d'); const ratio=window.devicePixelRatio||1; const rect=canvas.getBoundingClientRect(); canvas.width=Math.floor(rect.width*ratio); canvas.height=Math.floor(360*ratio); ctx.scale(ratio,ratio); ctx.clearRect(0,0,rect.width,360); const list=d.series||[]; const p={top:20,right:18,bottom:44,left:44}, w=rect.width-p.left-p.right, h=360-p.top-p.bottom; const vals=[...list.map(x=>x.close),...list.map(x=>x.sma20),...list.map(x=>x.sma60),...list.map(x=>x.sma120),d.analysis.pivotalPoint].filter(v=>Number.isFinite(v)); if(!vals.length) return; const min=Math.min(...vals), max=Math.max(...vals), pad=(max-min)*.08||1, yMin=min-pad, yMax=max+pad; const x=i=>p.left+(i/Math.max(list.length-1,1))*w, y=v=>p.top+(1-(v-yMin)/(yMax-yMin))*h; ctx.strokeStyle='#e7edf7'; for(let i=0;i<5;i++){ const gy=p.top+(h/4)*i; ctx.beginPath(); ctx.moveTo(p.left,gy); ctx.lineTo(p.left+w,gy); ctx.stroke(); } const line=(arr,color,width=2)=>{ ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=width; let started=false; arr.forEach((v,i)=>{ if(!Number.isFinite(v)) return; const xi=x(i), yi=y(v); if(!started){ctx.moveTo(xi,yi); started=true;} else ctx.lineTo(xi,yi); }); ctx.stroke(); }; const grad=ctx.createLinearGradient(0,p.top,0,p.top+h); grad.addColorStop(0,'rgba(47,111,237,.18)'); grad.addColorStop(1,'rgba(47,111,237,.02)'); ctx.beginPath(); list.forEach((row,i)=>{ if(!Number.isFinite(row.close)) return; const xi=x(i), yi=y(row.close); if(i===0) ctx.moveTo(xi,yi); else ctx.lineTo(xi,yi); }); ctx.lineTo(p.left+w,p.top+h); ctx.lineTo(p.left,p.top+h); ctx.closePath(); ctx.fillStyle=grad; ctx.fill(); line(list.map(r=>r.close),'#2f6fed',2.8); line(list.map(r=>r.sma20),'#16a34a',2); line(list.map(r=>r.sma60),'#ea580c',2); line(list.map(r=>r.sma120),'#7c3aed',2); if(Number.isFinite(d.analysis.pivotalPoint)){ const py=y(d.analysis.pivotalPoint); ctx.strokeStyle='#ef4444'; ctx.setLineDash([6,4]); ctx.beginPath(); ctx.moveTo(p.left,py); ctx.lineTo(p.left+w,py); ctx.stroke(); ctx.setLineDash([]); } }
async function analyzeSymbol(symbol){ const normalized=normalizeSymbol(symbol, els.marketSelect.value); if(!normalized) throw new Error('종목 코드를 입력해 주세요.'); const data=await fetchJSON(`/analyze?symbol=${encodeURIComponent(normalized)}&range=${encodeURIComponent(state.chartRange)}`); clearAutocomplete(); state.current=data; renderStatusChips(data); renderSummary(data); renderChecklist(data); drawChart(data); els.symbolInput.value=normalized; return data; }
async function renderWatchlist(){ if(!state.watchlist.length){ els.watchlist.innerHTML='<div class="muted">아직 워치리스트가 없습니다. 먼저 종목을 분석한 뒤 현재 종목 추가를 눌러 주세요.</div>'; return; } els.watchlist.innerHTML='<div class="muted">목록 분석 중...</div>'; try{ const data=await fetchJSON('/batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({symbols:state.watchlist})}); const items=(data.items||[]).filter(x=>!x.error).sort((a,b)=>b.analysis.score-a.analysis.score); els.watchlist.innerHTML=items.map(item=>`<div class="watch-item"><div><div style="font-weight:800">${item.meta.displayName||item.meta.symbol}</div><div class="muted" style="margin-top:4px">${item.meta.symbol}</div><div class="watch-meta"><span class="mini-chip">점수 ${item.analysis.score.toFixed(0)}</span><span class="mini-chip">1M ${Number(item.returns['1m']).toFixed(1)}%</span><span class="mini-chip">3M ${Number(item.returns['3m']).toFixed(1)}%</span><span class="mini-chip">6M ${Number(item.returns['6m']).toFixed(1)}%</span><span class="mini-chip">1Y ${Number(item.returns['1y']).toFixed(1)}%</span><span class="mini-chip">${item.analysis.pivotalLabel}</span></div></div><div class="toolbar"><button class="secondary" onclick="window.selectWatch('${item.meta.symbol}')">열기</button><button class="secondary" onclick="window.removeWatch('${item.meta.symbol}')">삭제</button></div></div>`).join(''); }catch(err){ els.watchlist.innerHTML=`<div class="muted">워치리스트 갱신 실패: ${err.message}</div>`; } }
window.selectWatch = async function(symbol){ try{ await analyzeSymbol(symbol); window.scrollTo({top:0,behavior:'smooth'}); }catch(err){ alert(err.message); } }
window.removeWatch = function(symbol){ state.watchlist = state.watchlist.filter(s=>s!==symbol); saveWatchlist(); renderWatchlist(); }
els.symbolInput.addEventListener('input',()=>{ lastAutocompleteQuery=els.symbolInput.value.trim(); clearTimeout(autocompleteTimer); autocompleteTimer=setTimeout(()=>fetchAutocomplete(lastAutocompleteQuery),220); });
els.symbolInput.addEventListener('blur',()=>setTimeout(clearAutocomplete,160));
els.symbolInput.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); els.analyzeBtn.click(); } });
els.marketSelect.addEventListener('change',()=>{ if(els.symbolInput.value.trim().length>=2){ lastAutocompleteQuery=els.symbolInput.value.trim(); fetchAutocomplete(lastAutocompleteQuery); } });
els.analyzeBtn.addEventListener('click',async()=>{ try{ await analyzeSymbol(els.symbolInput.value); }catch(err){ alert(`분석 실패: ${err.message}`); } });
document.querySelectorAll('[data-range]').forEach(btn=>btn.addEventListener('click',async()=>{ state.chartRange=btn.dataset.range; if(state.current){ try{ await analyzeSymbol(state.current.meta.symbol); }catch(err){ alert(`범위 변경 실패: ${err.message}`); } } }));
els.addWatchlistBtn.addEventListener('click',()=>{ if(!state.current?.meta?.symbol) return alert('먼저 종목을 분석해 주세요.'); const s=state.current.meta.symbol; if(!state.watchlist.includes(s)) state.watchlist.push(s); saveWatchlist(); renderWatchlist(); });
els.refreshWatchlistBtn.addEventListener('click',renderWatchlist);
els.clearWatchlistBtn.addEventListener('click',()=>{ if(!confirm('워치리스트를 모두 삭제할까요?')) return; state.watchlist=[]; saveWatchlist(); renderWatchlist(); });
window.addEventListener('resize',()=>{ if(state.current) drawChart(state.current); });
(function init(){ loadWatchlist(); renderWatchlist(); els.summaryGrid.innerHTML=[['현재가','-'],['전일 대비','-'],['1주','-'],['2주','-'],['1개월','-'],['2개월','-'],['3개월','-'],['6개월','-'],['1년','-'],['추세 점수','-'],['거래량 비율','-'],['피보탈','-']].map(([l,v])=>`<div class="stat"><div class="label">${l}</div><div class="value">${v}</div></div>`).join(''); els.checklist.innerHTML='<div class="muted">종목을 분석하면 리버모어 체크리스트가 표시됩니다.</div>'; els.statusChips.innerHTML='<span class="chip">라이트모드 전용</span><span class="chip">stocketf 적용본</span>'; })();
</script>
</body>
</html>
