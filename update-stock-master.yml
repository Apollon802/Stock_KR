name: Update Korean Stock Master

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC. 23:00 UTC = 08:00 KST next day.
    # Runs Mon-Fri KST morning approximately.
    - cron: "0 23 * * 0-4"

permissions:
  contents: write

jobs:
  update-master:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate kr_stock_master.json
        run: python scripts/generate_stock_master.py

      - name: Show generated file summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path('kr_stock_master.json')
          data = json.loads(p.read_text(encoding='utf-8'))
          print('count=', len(data))
          print('first=', data[0] if data else None)
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kr_stock_master.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Korean stock master"
            git push
          fi
